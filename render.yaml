# Render Blueprint — deploys Smart Dossier in one click
# https://render.com/docs/blueprint-spec

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  - type: pserv
    name: smart-dossier-db
    plan: free
    ipAllowList: []  # only internal connections

  # ── Web Service (backend + frontend in one container) ─────────────────────
  - type: web
    name: smart-dossier
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-dossier-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://smart-dossier.onrender.com"]'
      - key: OLLAMA_HOST
        value: http://localhost:11434
      # Ollama is not bundled in the Free-plan container. AI checklists gracefully no-op when
      # unavailable. Add Ollama to Dockerfile.render for full AI features (requires Standard plan).
      - key: OLLAMA_MODEL
        value: qwen2.5:1.5b
      - key: UPLOAD_DIR
        value: /tmp/uploads
